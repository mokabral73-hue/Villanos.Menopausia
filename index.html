.opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.vil-big-n { font-family: 'Bangers',cursive; font-size: 2rem; letter-spacing: 2px; color: #1a1a1a; }
.vil-tag { font-size: 0.87rem; color: #888; margin-top: 0.3rem; font-style: italic; }
.bars { display: flex; flex-direction: column; gap: 8px; margin: 1.2rem 0 0.4rem; text-align: left; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-lbl { width: 110px; flex-shrink: 0; color: #666; font-weight: 600; font-size: 0.79rem; }
.bar-track { flex: 1; height: 7px; background: #f0e8e8; border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; }
.bp { border: 1px solid #f0d8d8; border-radius: 16px; overflow: hidden; margin-bottom: 1rem; background: #fff; }
.bp-sec { padding: 1rem 1.2rem; border-bottom: 1px solid #f0e8e8; }

    g.appendChild(b);
  });
  document.getElementById('btn-bk').style.display=cur===0?'none':'block';
  document.getElementById('btn-nxt').disabled=ans[cur]===undefined;
  document.getElementById('btn-nxt').textContent=cur===Qs.length-1?'Ver mi villano →':'Siguiente →';
}

function pick(i){
  ans[cur]=i;
  document.querySelectorAll('.opt').forEach((b,idx)=>b.classList.toggle('sel',idx===i));
  document.getElementById('btn-nxt').disabled=false;
}

function goNext(){ if(ans[cur]===undefined)return; cur++; cur>=Qs.length?showRes():render(); }
function goBack(){ if(cur>0){cur--;render();} }

function showRes(){
  scores={calor:0,insomnio:0,humor:0,energia:0,piel:0,libido:0,peso:0,memoria:0,oxidada:0,histaminica:0};
  ans.forEach((a,qi)=>{
    Object.entries(Qs[qi].opts[a].v).forEach(([k,val])=>{ if(scores[k]!==undefined) scores[k]=Math.max(0,scores[k]+val); });
  });
  const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const vil=VIL[top];
  const maxS=Math.max(...Object.values(scores))||1;

  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('res').style.display='block';
  document.getElementById('res-e').textContent=vil.emoji;
  document.getElementById('res-n').textContent=vil.name;
  document.getElementById('res-tag').textContent=vil.tag;

  const ord=[
    {k:'calor',l:'Bochornos',c:'coral'},{k:'insomnio',l:'Sueño',c:'purple'},
    {k:'humor',l:'Humor',c:'pink'},{k:'energia',l:'Energía',c:'amber'},
    {k:'piel',l:'Piel',c:'teal'},{k:'libido',l:'Libido',c:'blue'},
    {k:'peso',l:'Peso',c:'green'},{k:'memoria',l:'Memoria',c:'amber'},
    {k:'oxidada',l:'Articulaciones',c:'brown'},{k:'histaminica',l:'Histamina',c:'gold'}
  ];
  const bEl=document.getElementById('bars'); bEl.innerHTML='';
  ord.forEach(v=>{
    const pct=Math.round((scores[v.k]/(maxS+1))*100);
    const r=document.createElement('div'); r.className='bar-row';
    r.innerHTML=`<span class="bar-lbl">${VIL[v.k].emoji} ${v.l}</span><div class="bar-track"><div class="bar-fill sc-${v.c}" style="width:0%" id="bf-${v.k}"></div></div>`;
    bEl.appendChild(r);
    setTimeout(()=>{ document.getElementById('bf-'+v.k).style.width=pct+'%'; },250);
  });

  const armasHTML = vil.armas.map(a=>`
    <div class="wp">
      <span class="wp-ic">${a.i}</span>
      <div>
        <div class="wp-n">${a.n}${a.base?' <span class="tag-base">base</span>':''}</div>
        <div class="wp-d">${a.d}</div>
      </div>
    </div>`).join('');

  document.getElementById('bp').innerHTML=`
    <div class="bp-sec">
      <div class="bp-ttl" style="color:${vil.hex}">⚔️ Tus armas secretas</div>
      <div class="wp-list">${armasHTML}</div>
    </div>
    <div class="bp-sec">
      <div class="bp-ttl" style="color:${vil.hex}">🏆 Hábitos que lo derrotan</div>
      <div>${vil.hab.map(h=>`<span class="chip">${h}</span>`).join('')}</div>
    </div>
    <div class="bp-sec">
      <div class="bp-ttl" style="color:${vil.hex}">🌟 Tu protocolo prioritario</div>
      <div class="wp"><span class="wp-ic">💊</span><div>
        <div class="wp-n">${vil.sup}</div>
        <div class="wp-d">🌷 Envíame tu resultado por WhatsApp y recibirás una orientación personalizada sin costo.</div>
      </div></div>
    </div>`;

  waMsg=encodeURIComponent(`¡Hola Mony! Hice el quiz de Los Villanos de la Menopausia y mi villano principal es "${vil.name}" ${vil.emoji}. Mi protocolo recomendado es: ${vil.sup}. ¿Me ayudas a empezar? 🌹`);
}

function openWA(){ window.open(`https://wa.me/${WA}?text=${waMsg}`,'_blank'); }

function restart(){
  cur=0; ans=[];
  scores={calor:0,insomnio:0,humor:0,energia:0,piel:0,libido:0,peso:0,memoria:0,oxidada:0,histaminica:0};
  document.getElementById('res').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  render();
}

render();
</script>
</body>
</html>
